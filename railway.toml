[build]
builder = "dockerfile"
dockerfilePath = "Dockerfile"

[deploy]
# startCommand TIDAK diisi — Railway akan gunakan CMD dari Dockerfile
# (docker-entrypoint.sh yang menginisialisasi DB lalu start Apache)
healthcheckPath = "/"
# Timeout 300 detik: memberi waktu cukup untuk:
# - MySQL wait (max 60 detik)
# - DB initialization / schema import
# - Apache startup
healthcheckTimeout = 300
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
