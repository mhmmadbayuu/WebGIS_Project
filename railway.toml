[build]
builder = "dockerfile"
dockerfilePath = "Dockerfile"

[deploy]
# startCommand DIHAPUS karena akan OVERRIDE CMD di Dockerfile
# dan melewati script inisialisasi database (docker-entrypoint.sh).
# Railway akan menggunakan CMD dari Dockerfile secara otomatis.
healthcheckPath = "/"
healthcheckTimeout = 60
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
